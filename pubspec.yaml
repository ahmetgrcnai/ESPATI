name: espati
description: A social media app for pet owners to connect, share, and discover pet-friendly places.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  google_fonts: ^6.1.0
  cached_network_image: ^3.3.1
  image_picker: ^1.0.7
  flutter_staggered_grid_view: ^0.7.0
  google_maps_flutter: ^2.5.3
  provider: ^6.1.1
  geolocator: ^13.0.2
  http: ^1.2.0
  flutter_dotenv: ^5.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
  assets:
    - .env
    - assets/images/
